name: mindflow
description: >
  MindFlow — an AI-ready learning platform: import documents and read them
  faster with a configurable RSVP engine. Phase 1 targets Android; the
  architecture is designed to extend to Windows/macOS/Linux/iOS/Web and
  browser extensions without a rewrite.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # The pure-Dart RSVP engine, kept as a local package (see
  # ../packages/reading_engine) so it stays Flutter-independent.
  reading_engine:
    path: ../packages/reading_engine

  # State management / navigation / UI
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0

  # File import
  file_picker: 10.3.7

  # Document parsing
  syncfusion_flutter_pdf: ^33.2.13   # pure-Dart PDF text extraction
  archive: ^3.6.1                  # DOCX is a zip archive
  xml: ^6.5.0                      # DOCX body is WordprocessingML
  markdown: ^7.2.2                 # Markdown -> AST
  html: ^0.15.4                    # HTML -> DOM

  # Storage: sqflite (relational: library/blocks/bookmarks/history) +
  # Hive (fast key-value: settings/progress). No code generation required
  # for either, by design -- keeps `flutter pub get` the only setup step.
  sqflite: ^2.3.3+1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path: ^1.9.0
  path_provider: ^2.1.3

  equatable: ^2.0.5
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
